    - 前后端 Track: frontend-and-backend/index_frontend-and-backend.md
    - AI Track: ai/index_ai.md
    - 科研 Track: research/index_research.md
    - Cyber Track: cyber/index_cyber.md
  - 基础:
    - basic/index_basic.md
    - CS 生存指南:
      - basic/survival-guide/index.md
    - Coding Agent:
      - basic/coding-agent/index.md
  - 前后端:
    - frontend-and-backend/index_frontend-and-backend.md
    - 前端:
      - frontend-and-backend/frontend/index.md
    - 后端:
      - frontend-and-backend/backend/index.md
  - AI:
    - ai/index_ai.md
    - AI Overview:
      - ai/overview/index.md
    - ML System:
      - ai/ML/index.md
    - LLM:
      - ai/LLM/index.md
    - Harness:
      - ai/harness/index.md
    - Diffusion:
      - ai/diffusion/index.md
    - Embodied AI:
      - ai/embodied/index.md
  - 科研:
    - research/index_research.md
    - 科研分享（一）:
      - research/first/index.md
    - 科研分享（二）:
      - research/second/index.md
  - Cyber:
    - cyber/index_cyber.md
